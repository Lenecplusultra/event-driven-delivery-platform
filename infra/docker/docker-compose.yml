version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Event-Driven Delivery Platform — Full Local Stack
#
# Run from the repo root:
#   docker compose -f infra/docker/docker-compose.yml up --build
#
# Build context for all services is the repo root so that libs/ is accessible.
#
# Port exposure:
#   EXPOSED  — things you open from your browser/laptop:
#              services (8001-8003), Kafka (9092), Redis (6379),
#              Jaeger (16686), Prometheus (9090), Grafana (3000), OTel (4317)
#   INTERNAL — all Postgres instances: services reach them by container name
#              e.g. order-db:5432. No host ports, no conflicts.
#
# To inspect a database directly:
#   docker exec -it order-db psql -U delivery -d order_db
# ─────────────────────────────────────────────────────────────────────────────

networks:
  delivery-net:
    driver: bridge

volumes:
  order-db-data:
  payment-db-data:
  dispatch-db-data:
  notification-db-data:
  auth-db-data:
  customer-db-data:
  restaurant-db-data:
  redis-data:
  prometheus-data:
  grafana-data:

# ── Shared env anchors ────────────────────────────────────────────────────────
# These are referenced in each service block with <<: *common-env
x-common-env: &common-env
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  REDIS_URL: redis://redis:6379/0
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  OTEL_TRACES_ENABLED: "true"
  ENVIRONMENT: local
  LOG_LEVEL: INFO

services:

  # ── Kafka (KRaft — no Zookeeper) ───────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"     # Exposed for bootstrap-topics.sh and local debugging
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      # Two listeners: one for containers (INTERNAL), one for host (EXTERNAL)
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: "delivery-platform-local"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s
    networks:
      - delivery-net

  # ── PostgreSQL — one per service, internal only ────────────────────────────

  order-db:
    image: postgres:16-alpine
    container_name: order-db
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: delivery
      POSTGRES_PASSWORD: delivery_secret
    volumes:
      - order-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U delivery -d order_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - delivery-net

  payment-db:
    image: postgres:16-alpine
    container_name: payment-db
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: delivery
      POSTGRES_PASSWORD: delivery_secret
    volumes:
      - payment-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U delivery -d payment_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - delivery-net

  restaurant-db:
    image: postgres:16-alpine
    container_name: restaurant-db
    environment:
      POSTGRES_DB: restaurant_db
      POSTGRES_USER: delivery
      POSTGRES_PASSWORD: delivery_secret
    volumes:
      - restaurant-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U delivery -d restaurant_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - delivery-net

  dispatch-db:
    image: postgres:16-alpine
    container_name: dispatch-db
    environment:
      POSTGRES_DB: dispatch_db
      POSTGRES_USER: delivery
      POSTGRES_PASSWORD: delivery_secret
    volumes:
      - dispatch-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U delivery -d dispatch_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - delivery-net

  notification-db:
    image: postgres:16-alpine
    container_name: notification-db
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: delivery
      POSTGRES_PASSWORD: delivery_secret
    volumes:
      - notification-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U delivery -d notification_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - delivery-net

  auth-db:
    image: postgres:16-alpine
    container_name: auth-db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: delivery
      POSTGRES_PASSWORD: delivery_secret
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    networks:
      - delivery-net

  customer-db:
    image: postgres:16-alpine
    container_name: customer-db
    environment:
      POSTGRES_DB: customer_db
      POSTGRES_USER: delivery
      POSTGRES_PASSWORD: delivery_secret
    volumes:
      - customer-db-data:/var/lib/postgresql/data
    networks:
      - delivery-net

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"     # Exposed for local inspection with redis-cli
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - delivery-net

  # ── Observability ──────────────────────────────────────────────────────────

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.108.0
    container_name: otel-collector
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ../observability/otel-collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"     # OTLP gRPC — services send traces here
      - "4318:4318"     # OTLP HTTP
      - "8888:8888"     # Collector self-metrics
    depends_on:
      - jaeger
      - prometheus
    networks:
      - delivery-net

  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI → http://localhost:16686
      - "14250:14250"
    networks:
      - delivery-net

  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yaml"
      - "--storage.tsdb.retention.time=7d"
    volumes:
      - ./observability/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"     # Prometheus UI → http://localhost:9090
    networks:
      - delivery-net

  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"     # Grafana UI → http://localhost:3000
    depends_on:
      - prometheus
    networks:
      - delivery-net

  # ── Application Services ───────────────────────────────────────────────────
  # Build context is ../../ (repo root) so libs/ is accessible to all builds.
  # Each service waits for its DB and Kafka to be healthy before starting.

  order-service:
    build:
      context: ../..
      dockerfile: services/order-service/Dockerfile
    container_name: order-service
    ports:
      - "8001:8001"     # Exposed: POST /v1/orders, GET /v1/orders/{id}
    environment:
      <<: *common-env
      SERVICE_NAME: order-service
      DATABASE_URL: postgresql+asyncpg://delivery:delivery_secret@order-db:5432/order_db
      KAFKA_CONSUMER_GROUP_ID: order-service-group
    depends_on:
      order-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure
    networks:
      - delivery-net

  restaurant-service:
    build:
      context: ../..
      dockerfile: services/restaurant-service/Dockerfile
    container_name: restaurant-service
    ports:
      - "8002:8002"     # Exposed: restaurant CRUD + menu endpoints
    environment:
      <<: *common-env
      SERVICE_NAME: restaurant-service
      DATABASE_URL: postgresql+asyncpg://delivery:delivery_secret@restaurant-db:5432/restaurant_db
      KAFKA_CONSUMER_GROUP_ID: restaurant-service-group
      AUTO_CONFIRM_ORDERS: "true"
      AUTO_CONFIRM_DELAY_SECONDS: "0.5"
    depends_on:
      restaurant-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure
    networks:
      - delivery-net

  payment-service:
    build:
      context: ../..
      dockerfile: services/payment-service/Dockerfile
    container_name: payment-service
    ports:
      - "8003:8003"     # Exposed: GET /v1/payments/order/{id}, POST refund
    environment:
      <<: *common-env
      SERVICE_NAME: payment-service
      DATABASE_URL: postgresql+asyncpg://delivery:delivery_secret@payment-db:5432/payment_db
      KAFKA_CONSUMER_GROUP_ID: payment-service-group
      SIMULATED_FAILURE_RATE: "0.1"
      SIMULATED_PROCESSING_DELAY: "0.3"
      MAX_TRANSACTION_AMOUNT_CENTS: "100000"
    depends_on:
      payment-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure
    networks:
      - delivery-net
